<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - F5M Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #121212; 
            color: #fff; 
            margin: 0; 
            padding: 0; 
        }
        
        /* الهيدر الرئيسي */
        .header-bar { 
            background: #1c1c1e; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #2c2c2e; 
        }
        .header-bar h1 { margin: 0; font-size: 20px; color: #fff; font-weight: bold; }
        .cart-icon-btn { color: #ff3b30; font-size: 22px; text-decoration: none; }
        
        /* شريط الأقسام والصفحات الفرعية التلقائي */
        .nav-categories {
            background: #1c1c1e;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 1px solid #2c2c2e;
            scrollbar-width: none;
        }
        .nav-categories::-webkit-scrollbar { display: none; }
        
        .nav-link {
            background: #2c2c2e;
            color: #aeaeb2;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .nav-link.active, .nav-link:hover {
            background: #ff3b30;
            color: #fff;
            border-color: #ff3b30;
        }

        /* عنوان ووصف القسم الحالي */
        .category-header {
            padding: 20px 15px 5px 15px;
            text-align: right;
        }
        .category-header h2 { margin: 0 0 5px 0; font-size: 22px; color: #ff3b30; }
        .category-header p { margin: 0; font-size: 13px; color: #aeaeb2; }

        /* شبكة كروت سلة الثنائية المتجاوبة */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 15px; 
        }
        .product-card { 
            background: #1c1c1e; 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            cursor: pointer; 
            border: 1px solid #2c2c2e; 
            transition: transform 0.2s ease;
        }
        .product-card:hover { transform: translateY(-3px); }
        
        .img-container { 
            width: 100%; 
            padding-top: 100%; 
            position: relative; 
            background: #2c2c2e; 
        }
        .img-container img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        
        .card-info { padding: 12px 10px 5px 10px; text-align: right; }
        .stars { color: #ffcc00; font-size: 11px; margin-bottom: 5px; }
        .product-name { 
            margin: 0 0 6px 0; 
            font-size: 14px; 
            color: #fff; 
            font-weight: 500; 
            line-height: 1.4; 
            height: 38px; 
            overflow: hidden; 
        }
        .product-price { font-size: 16px; font-weight: bold; color: #fff; margin-top: 5px; }
        
        .card-actions { padding: 0 10px 12px 10px; display: flex; flex-direction: column; gap: 8px; }
        .btn-buy { 
            width: 100%; 
            padding: 10px; 
            background: #00b074; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .btn-cart { 
            width: 100%; 
            padding: 9px; 
            background: transparent; 
            color: #ff3b30; 
            border: 1px solid #ff3b30; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px; 
        }
    </style>
</head>
<body>

<div class="header-bar">
    <h1>F5M Store</h1>
    <a href="/cart" class="cart-icon-btn">
        <i class="fa-solid fa-basket-shopping"></i>
    </a>
</div>

<div class="nav-categories">
    <a href="/" class="nav-link">الرئيسية</a>
    {% for p in custom_pages %}
        <a href="/page/{{ p._id }}" class="nav-link {% if p._id|string == page._id|string %}active{% endif %}">{{ p.title }}</a>
    {% endfor %}
</div>

<div class="category-header">
    <h2>{{ page.title }}</h2>
    <p>{{ page.content }}</p>
</div>

<div class="products-grid">
    {% for product in products %}
    <div class="product-card" onclick="location.href='/product/{{ product._id }}'">
        <div>
            <div class="img-container">
                <img src="{{ product.image }}" alt="{{ product.name }}">
            </div>
            <div class="card-info">
                <div class="stars">⭐⭐⭐⭐⭐</div>
                <h3 class="product-name">{{ product.name }}</h3>
                <div class="product-price">{{ product.price }} ﷼</div>
            </div>
        </div>
        <div class="card-actions" onclick="event.stopPropagation();">
            <button class="btn-buy" onclick="quickBuy('{{ product._id }}', '{{ product.name }}', {{ product.price }})">شراء الآن</button>
            <button class="btn-cart" onclick="addToCart('{{ product._id }}', '{{ product.name }}', {{ product.price }})">
                <i class="fa-solid fa-basket-shopping"></i> إضافة للسلة
            </button>
        </div>
    </div>
    {% else %}
    <div style="grid-column: span 2; text-align: center; color: #8e8e93; padding: 40px 10px;">
        لا توجد منتجات معروضة في هذا القسم حالياً.
    </div>
    {% endfor %}
</div>

<script>
function addToCart(id, name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let found = cart.find(item => item.id === id);
    if (found) { found.quantity += 1; } else { cart.push({ id: id, name: name, price: price, quantity: 1 }); }
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("تم إضافة المنتج إلى السلة بنجاح! 🛒");
}

function quickBuy(id, name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let found = cart.find(item => item.id === id);
    if (!found) { cart.push({ id: id, name: name, price: price, quantity: 1 }); }
    localStorage.setItem("cart", JSON.stringify(cart));
    window.location.href = "/cart";
}
</script>
</body>
</html>
